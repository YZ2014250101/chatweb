<!DOCTYPE html>
<html lang="zh-CN">
<head>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>简易聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        /* 聊天消息容器 */
        #msg_box {
            height: 450px;
            overflow-y: auto;
            border-radius: 16px;
            padding: 20px;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 16px;
        }
        /* 美化滚动条 */
        #msg_box::-webkit-scrollbar {
            width: 6px;
        }
        #msg_box::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 3px;
        }
        #msg_box::-webkit-scrollbar-track {
            background: #f2f3f5;
        }
        /* 消息气泡通用 */
        #msg_box p {
            width: fit-content;
            max-width: 75%; /* 超长文字最多占屏幕75%宽度，自动换行 */
            padding: 8px 12px;
            border-radius: 18px;
            margin: 6px 0;
            line-height: 1.5;
            word-break: break-all;
            font-size: 15px;
        }
        /* 对方消息气泡 */
        #msg_box p:not([data-self]) {
            background: #e4e7ed;
            color: #303133;
            border-top-left-radius: 4px;
            text-align: left;
        }
        /* 自己消息气泡 */
        #msg_box p[data-self="true"] {
            background: #409eff;
            color: white;
            margin-left: auto;
            border-top-right-radius: 4px;
            text-align: right;
        }
        /* 系统提示文字（连接成功/失败） */
        #msg_box p.system {
            max-width: 100%;
            text-align: center;
            background: transparent;
            color: #909399;
            font-size: 13px;
            padding: 4px;
            margin: 12px 0;
        }
        /* 输入区域容器 */
        .input-wrap {
            display: flex;
            gap: 10px;
        }
        #input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            transition: border 0.2s;
        }
        #input:focus {
            border-color: #409eff;
        }
        button {
            padding: 0 24px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background: #66b1ff;
        }
        /* 语音播放按钮样式 */
        .voice-play {
            border: none;
            background: #007aff;
            color: #fff;
            border-radius: 8px;
            padding: 4px 10px;
            cursor: pointer;
        }
        /* 录音按钮单独样式 */
        #recordBtn {
            background: #ff6b6b;
        }
        #recordBtn:hover {
            background: #ff8787;
        }
        #recordBtn {
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
    </style>
</head>
<body>
    <!-- 修复多余闭合div -->
    <div style="position:fixed;top:10px;left:10px;background:#409eff;color:#fff;padding:4px 12px;border-radius:12px;font-size:14px;z-index:999;">
        在线人数：<span id="onlineCount">0</span>
    </div>

    <div id="msg_box"></div>
    <div class="input-wrap">
        <input id="input" placeholder="输入文字 / 按住右侧语音按钮发语音" onkeydown="if(event.key === 'Enter') send();">
        <button onclick="send()">发送文字</button>
        <button id="recordBtn" class="record-btn">按住说话</button>
    </div>

<script>
    const onlineCountEl = document.getElementById('onlineCount');
    const box = document.getElementById("msg_box");
    const input = document.getElementById("input");
    const recordBtn = document.getElementById('recordBtn');

    // 更新在线人数
    function updateOnlineNum(num){
        onlineCountEl.innerText = num;
    }

    // XSS转义
    function htmlEscape(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // 统一消息渲染，限制最多50条消息，防抖滚动
    let scrollTimer = null;
    function appendMsg(htmlStr, isSelf = false) {
        if (isSelf) {
            box.innerHTML += `<p data-self="true">${htmlStr}</p>`;
        } else {
            box.innerHTML += `<p>${htmlStr}</p>`;
        }
        // 超过50条自动删除最早消息，防止卡顿
        while (box.children.length > 50) {
            box.removeChild(box.firstElementChild);
        }
        // 防抖滚动
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
            box.scrollTop = box.scrollHeight;
        }, 30);
    }

    // WS地址自动适配http/https
    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const host = window.location.host;
    const wsUrl = `${protocol}//${host}/ws`;
    const ws = new WebSocket(wsUrl);

    // WS连接成功
    ws.onopen = () => {
        appendMsg(`<span style="color:#909399;">✅ 已成功连接聊天室</span>`);
    };

    // 接收后端消息（在线人数/文字/语音）
    ws.onmessage = async e => {
        // 分支1：收到二进制数据 = 语音消息
        if (e.data instanceof ArrayBuffer) {
            const buf = new Uint8Array(e.data);
            // 首字节0x01代表语音
            if (buf[0] === 0x01) {
                // 截取去掉标记后的纯音频二进制
                const audioRaw = buf.slice(1);
                const audioBlob = new Blob([audioRaw], { type: mimeType });
                const audioSrc = URL.createObjectURL(audioBlob);
                // 读取时长渲染气泡
                const tempAudio = new Audio(audioSrc);
                tempAudio.addEventListener('loadedmetadata', () => {
                    const audioSecond = parseFloat(tempAudio.duration.toFixed(1));
                    let bubbleWidth = 100 + audioSecond * 13;
                    if (bubbleWidth > 300) bubbleWidth = 300;
                    appendMsg(`
                        <button 
                            class="voice-play" 
                            data-binary-url="${audioSrc}"
                            style="width: ${bubbleWidth}px;"
                        >
                            语音 ${audioSecond}″
                    `);
                });
                return;
            }
        }

        // 分支2：普通文本消息（在线人数#N#、文字聊天）
        const data = e.data;
        if(data.startsWith("#N#")){
            const num = data.replace("#N#", "");
            updateOnlineNum(num);
            return;
        }
        // 旧的 #VOICE# base64 分支可以直接删除，不再使用
        const safeText = htmlEscape(data);
        appendMsg(safeText);
    };

    // WS连接失败
    ws.onerror = () => {
        appendMsg(`<span style="color:red;">❌ WebSocket连接失败，请刷新页面</span>`);
    }

    // WS断开
    ws.onclose = () => {
        appendMsg(`<span style="color:red;">⚠️ 连接已断开，请刷新页面重连</span>`);
    }

    // 发送文字消息
    function send(){
        let text = input.value.trim();
        if(!text) return;
        if(text.length > 500){
            alert("消息不能超过500个字符，请删减后再发送");
            return;
        }
        ws.send(text);
        const safeText = htmlEscape(text);
        appendMsg(safeText, true);
        input.value = "";
    }













    // ====================== 录音完整修复模块（最低录制1秒计时版） ======================
    let mediaRecorder = null;
    let audioStream = null;
    let audioChunks = [];
    let recordTimer = null;
    let recordStartTime = 0; // 新增：记录按下录音的时间戳
    const MIN_RECORD_SECOND = 1;  // 最低必须录制1秒
    const MAX_RECORD_SEC = 15;    // 最长15秒录音
    let currentPlayingAudio = null; // 全局播放锁，控制同时只能一条语音

    // 停止录音统一封装（接收事件对象，拦截默认行为）
    function recordStop(e) {
        if (e) {
            e.preventDefault();
            e.stopPropagation();
        }
        clearTimeout(recordTimer);
        if (!mediaRecorder || mediaRecorder.state !== "recording") return;
        mediaRecorder.stop();

        // 1. 彻底关闭麦克风轨道，释放通话音频占用（解决手机播放走听筒）
        audioStream.getTracks().forEach(track => {
            track.stop();
            track.enabled = false;
        });
        audioStream = null;
        mediaRecorder = null;

        recordBtn.innerText = "按住说话";
    }

    // 按下开始录音（接收事件对象，阻止长按复制弹窗）
    async function recordStart(e) {
        // 核心：拦截浏览器长按、选文字、弹出菜单默认行为
        e.preventDefault();
        e.stopPropagation();

        // 每次录音前置清空旧数据，防止分片错乱
        audioChunks = [];
        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        mediaRecorder = null;
        recordStartTime = Date.now(); // 记录录音开始时间

        try {
            // 获取麦克风
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // 兼容mp4避免听筒模式，优先mp4
            let mimeType;
            if (MediaRecorder.isTypeSupported("audio/mp4")) {
                mimeType = "audio/mp4";
            } else if (MediaRecorder.isTypeSupported("audio/webm; codecs=opus")) {
                mimeType = "audio/webm; codecs=opus";
            }
            mediaRecorder = new MediaRecorder(audioStream, { mimeType });

            // 所有事件必须在start前绑定（MDN文档强制规范）
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onerror = err => {
                alert("录音异常：" + err.message);
                recordStop();
            };

            mediaRecorder.onstop = async () => {
                // 计时判断录音≥1秒
                const recordCostMs = Date.now() - recordStartTime;
                const recordCostSec = recordCostMs / 1000;
                if (recordCostSec < MIN_RECORD_SECOND) {
                    alert(`录音时长不足${MIN_RECORD_SECOND}秒，请多说一会再松开！`);
                    audioChunks = [];
                    return;
                }
                // 拼接二进制音频Blob
                const audioBlob = new Blob(audioChunks, { type: mimeType });

                // ========== 二进制发送逻辑 替换原Base64代码 ==========
                // 1. 构造消息标记：0x01 代表语音二进制数据
                const VOICE_FLAG = new Uint8Array([0x01]);
                // 2. 合并标记 + 音频二进制
                const totalBuf = await new Blob([VOICE_FLAG, audioBlob]).arrayBuffer();
                // 3. WebSocket 直接发送二进制Buffer
                ws.send(totalBuf);

                // 本地渲染自己的语音气泡（仅前端本地展示，不用发给后端）
                const localUrl = URL.createObjectURL(audioBlob);
                const tempAudio = new Audio(localUrl);
                tempAudio.addEventListener('loadedmetadata', () => {
                    const audioSecond = parseFloat(tempAudio.duration.toFixed(1));
                    let bubbleWidth = 100 + audioSecond * 13;
                    if (bubbleWidth > 300) bubbleWidth = 300;
                    appendMsg(`
                        <button 
                            class="voice-play" 
                            data-binary-url="${localUrl}"
                            style="width: ${bubbleWidth}px;"
                        >
                            语音 ${audioSecond}″
                        </button>
                    `, true);
                });
                // =====================================================
            };

            mediaRecorder.start();
            recordBtn.innerText = `松开发送(最长${MAX_RECORD_SEC}s)`;

            // 15秒自动停止
            recordTimer = setTimeout(() => {
                recordStop();
                alert("语音最长15秒，已自动停止");
            }, MAX_RECORD_SEC * 1000);

        } catch (err) {
            alert("麦克风权限获取失败！本地localhost可正常使用，公网访问需要HTTPS");
            console.error("麦克风错误：", err);
        }
    }

    // ========== 绑定事件：PC鼠标 + 手机触摸双兼容 ==========
    // PC鼠标
    recordBtn.onmousedown = recordStart;
    recordBtn.onmouseup = recordStop;
    recordBtn.onmouseleave = recordStop;

    // 手机触摸（关键，解决长按复制、滑出停止录音）
    recordBtn.addEventListener('touchstart', recordStart);
    recordBtn.addEventListener('touchend', recordStop);
    recordBtn.addEventListener('touchcancel', recordStop); // 手指滑出按钮自动停止

    // 复用函数：根据base64音频生成带时长、自适应宽度的语音气泡
    function createVoiceHtml(audioBase64, isSelf = false) {
        return new Promise((resolve) => {
            const tempAudio = new Audio(audioBase64);
            tempAudio.addEventListener('loadedmetadata', () => {
                const audioSecond = parseFloat(tempAudio.duration.toFixed(1));
                let bubbleWidth = 100 + audioSecond * 13;
                if (bubbleWidth > 300) bubbleWidth = 300;
                const html = `
                    <button 
                        class="voice-play" 
                        data-audio="${audioBase64}" 
                        data-duration="${audioSecond}"
                        style="width: ${bubbleWidth}px;"
                    >
                        语音 ${audioSecond}″
                    </button>
                `;
                resolve({ html, isSelf });
            });
        });
    }

    // 全局语音播放点击事件【修改后：同一时间仅播放一条】
    box.addEventListener("click", ev => {
        const target = ev.target;
        if (!target.classList.contains("voice-play")) return;
        const audioSrc = target.dataset.binaryUrl;

        if (currentPlayingAudio) {
            currentPlayingAudio.pause();
            currentPlayingAudio = null;
        }

        const audio = new Audio(audioSrc);
        if (audio.webkitAudioSessionCategory !== undefined) {
            audio.webkitAudioSessionCategory = "playback";
        }
        currentPlayingAudio = audio;

        audio.addEventListener("ended", () => {
            if (currentPlayingAudio === audio) {
                currentPlayingAudio = null;
            }
        });

        audio.play().catch(e => console.log("播放拦截：", e));
    })
</script>
</body>
</html>
